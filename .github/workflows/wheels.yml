name: Build wheels

on:
  release:
    types: [published]
  push:
    tags:
      - '*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os.name }}
    runs-on: ${{ matrix.os.name }}
    strategy:
      matrix:
        os:
          - name: "ubuntu-24.04"
            platform: "linux"
            platform_id: "manylinux_x86_64"

          - name: "ubuntu-24.04-arm"
            platform: "linux"
            platform_id: "manylinux_aarch64"

          - name: "macos-14"
            platform: "macos"
            min_macos_version: "14"
            platform_id: "macosx_arm64"

          - name: "windows-2025"
            platform: "windows"
            platform_id: "win_amd64"

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up QEMU
        if: runner.os == 'Linux' && runner.arch == 'X64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          # Enable PyPy builds (required in cibuildwheel v3+)
          CIBW_ENABLE: pypy
          # Architectures: emulate ppc64le/s390x on x64 Linux, armv7l on ARM Linux
          CIBW_ARCHS_LINUX: ${{ runner.arch == 'X64' && 'auto ppc64le s390x' || 'auto armv7l' }}
          CIBW_ARCHS_MACOS: "x86_64 universal2 arm64"
          # Skip free-threaded builds (t-suffix)
          CIBW_SKIP: "*t-*"
          CIBW_TEST_REQUIRES: tox
          CIBW_TEST_COMMAND: cd {project} && tox
          # Tests are skipped in CI to keep emulated (QEMU) builds tractable
          CIBW_TEST_SKIP: "*"
          CIBW_BUILD_VERBOSITY: 1

      - name: Store wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os.name }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
